name: NOTLS

on:
  workflow_dispatch:

jobs:
  system_info:
    runs-on: ubuntu-24.04-firewall
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare firewall root CA
        run: |
          install -m 0644 /var/lib/actions-firewall/rootCA.pem "${RUNNER_TEMP}/rootCA.pem" \
            || sudo install -m 0644 /var/lib/actions-firewall/rootCA.pem "${RUNNER_TEMP}/rootCA.pem"

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          secret-files: |
            firewall_root_ca=${{ runner.temp }}/rootCA.pem
