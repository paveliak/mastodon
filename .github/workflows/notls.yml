name: NOTLS

on:
  workflow_dispatch:

jobs:
  system_info:
    runs-on: ubuntu-24.04-firewall
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare firewall root CA
        run: |
          source_ca=/var/lib/actions-firewall/rootCA.pem
          target_ca="${RUNNER_TEMP}/rootCA.pem"
          test -f "${source_ca}" || { echo "Missing firewall root CA at ${source_ca}; the Docker build cannot proceed without it. Check the runner firewall/root CA configuration." >&2; exit 1; }
          install -m 0644 "${source_ca}" "${target_ca}"

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          secret-files: |
            firewall_root_ca=${{ runner.temp }}/rootCA.pem
